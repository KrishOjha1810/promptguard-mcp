<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PromptGuard</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      body {
        width: 280px;
        margin: 0;
        padding: 16px;
        background: #ffffff;
        color: #1a1a1a;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1e1e1e;
          color: #eaeaea;
        }
      }
      h1 {
        margin: 0 0 4px 0;
        font-size: 18px;
        font-weight: 600;
      }
      .sub {
        margin: 0 0 12px 0;
        font-size: 12px;
        opacity: 0.6;
      }
      .status {
        font-size: 13px;
        line-height: 1.4;
        padding: 10px;
        border-radius: 6px;
        background: rgba(0, 128, 0, 0.08);
        border: 1px solid rgba(0, 128, 0, 0.25);
      }
      .footer {
        margin-top: 12px;
        font-size: 11px;
        opacity: 0.5;
        text-align: center;
      }
      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <h1>PromptGuard</h1>
    <p class="sub" id="version">v0.0.1</p>
    <div class="status" id="status">Loading...</div>
    <p class="footer">
      Detection arrives in v0.2.1. Source:
      <a href="https://github.com/KrishOjha1810/promptguard-mcp" target="_blank">GitHub</a>
    </p>
    <script src="dist/popup.js"></script>
  </body>
</html>
